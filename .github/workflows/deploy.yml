name: Flask CI/CD Pipeline

# 언제 실행할지 정의
on:
  push:
    branches: [main]         # main 브랜치에 push될 때
  pull_request:
    branches: [main]         # main 브랜치로 PR 생성될 때

jobs:

  # =====================
  # 1단계: CI — 테스트
  # =====================
  test:
    runs-on: ubuntu-latest   # GitHub이 제공하는 Linux 환경에서 실행

    steps:
      # 코드를 가져옴
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Python 설치
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 패키지 설치
      - name: 의존성 설치
        run: pip install -r requirements.txt

      # 앱이 정상적으로 불러와지는지 확인
      - name: Flask 앱 임포트 테스트
        run: python -c "from api.index import app; print('✅ 앱 임포트 성공')"

  # =====================
  # 2단계: CD — 배포
  # =====================
  deploy:
    needs: test              # test 잡이 성공해야만 실행
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # main 브랜치에서만 배포

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Vercel CLI 설치
      - name: Vercel CLI 설치
        run: npm install -g vercel

      # Vercel에 배포
      - name: Vercel 운영 배포
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}